<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ExcaDrive Settings</title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <main>
      <h1>ExcaDrive Settings</h1>
      <p>Configure OAuth and default behavior for local development.</p>

      <form id="settings-form">
        <label>
          Google OAuth Client ID
          <input id="oauth-client-id" type="text" placeholder="123456-abc.apps.googleusercontent.com" />
        </label>

        <label>
          Default file name prefix
          <input id="file-prefix" type="text" placeholder="Excalidraw Drawing" />
        </label>

        <label>
          Max recent files
          <input id="max-recent-files" type="number" min="5" max="50" />
        </label>

        <button type="submit">Save settings</button>
      </form>

      <p id="status">Loading...</p>
    </main>

    <script type="module" src="./options.js"></script>
  </body>
  </html>
